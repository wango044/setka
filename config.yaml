brand:
  name: "Сетка фокус/доход/решения"
  voice: "Дерзко, экспертно, по делу. Без воды. Короткие предложения. Эмодзи в начале абзаца. В конце вопрос к аудитории. Без кликбейта."
  offers:
    - name: "Как заработать первые 10 000 руб в 16 лет"
      price: "300 руб"
      role: "entry guide"
    - name: "Шаблоны для Notion/Google Docs"
      price: "200 руб"
      role: "templates"
  funnel:
    - "TikTok ведет в публичные каналы."
    - "Публичные каналы прогревают и отправляют активных в приватный Штаб решений."
    - "В Штабе продаются гайды, шаблоны и партнерские рекомендации."
  banned_topics:
    - "обещания гарантированного заработка"
    - "серые схемы"
    - "медицинские утверждения без источников"
    - "кликбейт и фейковые кейсы"

channels:
  - key: "antiscroll"
    name: "Антискролл"
    peer: "@antiscroll_daily"
    audience: "Подростки и молодые взрослые, которые залипают в телефоне и хотят вернуть фокус."
    role: "top_of_funnel"
    daily_target_posts: 14
    content_pillars:
      - "цифровой детокс"
      - "концентрация"
      - "ментальное здоровье"
      - "борьба с зависимостью от соцсетей"
      - "полезные привычки"
    default_cta: "Хочешь чек-лист без воды? Напиши плюс."

  - key: "phone_money"
    name: "Деньги в телефоне"
    peer: "@phone_money_lab"
    audience: "Подростки и молодые взрослые, которым нужны легальные способы заработать или сэкономить через телефон."
    role: "middle_of_funnel"
    daily_target_posts: 10
    content_pillars:
      - "заработок в интернете"
      - "фриланс"
      - "нейросети"
      - "кэшбэк"
      - "подработки"
      - "экономия на тарифах и подписках"
    default_cta: "Хочешь список способов на 10 000 руб? Напиши плюс."

  - key: "solution_hq"
    name: "Штаб решений"
    peer: "-1003953545250"
    audience: "Самые активные подписчики, которым нужны чек-листы, шаблоны и разборы задач."
    role: "core_private"
    daily_target_posts: 3
    content_pillars:
      - "чек-листы"
      - "шаблоны"
      - "разборы сложных задач"
      - "планы действий"
    default_cta: "Хочешь шаблон? Забирай в закрепе."

calendar:
  posts_per_channel: 10
  timezone: "Europe/Moscow"
  slots:
    - "10:00"
    - "14:00"
    - "18:00"
    - "21:00"
  slot_roles:
    "10:00": "Полезный пост: лайфхак, тула, совет."
    "14:00": "Глубокий разбор: кейс, инструкция, обзор."
    "18:00": "Интерактив: опрос, вопрос к аудитории, обсуждение."
    "21:00": "Вечерний дайджест или бонус-контент."

generation:
  approve_before_scheduling: true
  improve_before_approval: true
  include_creative_prompt: true
  max_post_chars: 900
